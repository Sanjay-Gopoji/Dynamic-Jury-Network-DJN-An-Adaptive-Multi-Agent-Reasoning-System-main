<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}DJN{% endblock %}</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'webapp/css/app.css' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">DJN</div>
      <div class="brandText">
        <div class="brandTitle">Dynamic Jury Network</div>
        <div class="brandSub">AI-powered deliberation</div>
      </div>
    </div>

    <nav class="nav">
      <a class="{% if request.path == '/' %}active{% endif %}" href="/">Home</a>
      <a class="{% if '/jury/' in request.path %}active{% endif %}" href="/jury/">Jury</a>
      <a class="{% if '/history/' in request.path %}active{% endif %}" href="/history/">History</a>
      <a class="{% if '/about/' in request.path %}active{% endif %}" href="/about/">About</a>
      <button class="themeToggle" onclick="toggleTheme()" title="Toggle theme">
        <span id="themeIcon">🌙</span>
      </button>
    </nav>
  </header>

  <main class="wrap">
    {% block content %}{% endblock %}
  </main>
<div id="djnLoading" class="djnLoading" aria-hidden="true">
  <div class="djnLoadingCard" role="dialog" aria-modal="true" aria-label="Loading">
    <div class="djnSpinner" aria-hidden="true"></div>
    <div class="djnLoadingTitle">DJN is deliberating…</div>
    <div class="djnLoadingSub">Coordinating jurors & drafting the best answer.</div>
  </div>
</div>

  <footer class="footer">
    <span>DJN v1.0 • Built with Django • © 2026</span>
  </footer>

  <script>
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('djn-theme', theme);
      updateThemeIcon(theme);
    }

    function updateThemeIcon(theme) {
      const icon = document.getElementById('themeIcon');
      icon.textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      setTheme(newTheme);
    }

    (function () {
      const savedTheme = localStorage.getItem('djn-theme') || 'light';
      setTheme(savedTheme);
    })();

    async function djnCopyFromTarget(btn) {
      const sel = btn.getAttribute("data-copy-target");
      const el = document.querySelector(sel);
      if (!el) return;

      const text = (el.innerText || el.textContent || "").trim();
      if (!text) return;

      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
      }

      const old = btn.innerText;
      btn.innerText = "✓ Copied!";
      btn.disabled = true;
      setTimeout(() => {
        btn.innerText = old || "Copy";
        btn.disabled = false;
      }, 1200);
    }

    function scrollChatToBottom() {
      const chatBox = document.querySelector('.chatBox');
      if (chatBox) {
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    }
function djnShowLoading() {
  document.documentElement.classList.add("djn-loading");
  const el = document.getElementById("djnLoading");
  if (el) el.setAttribute("aria-hidden", "false");
}
(function () {
  const nativeSubmit = HTMLFormElement.prototype.submit;
  HTMLFormElement.prototype.submit = function () {
    djnShowLoading();
    return nativeSubmit.call(this);
  };
})();

document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(
    "button.sendBtn, button.clearBtn, form[method='post'] button[type='submit']"
  ).forEach((btn) => {
    btn.addEventListener("click", () => djnShowLoading());
  });

  document.querySelectorAll("form[method='post']").forEach((f) => {
    f.addEventListener("submit", () => {
      if (f.dataset.submitting === "1") return;
      f.dataset.submitting = "1";
      djnShowLoading();
    });
  });
});


    document.addEventListener('DOMContentLoaded', () => {
      scrollChatToBottom();
    });
  </script>

</body>

</html>
